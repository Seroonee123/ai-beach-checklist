<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate AI Beach Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Print Styles - Forces A4 behavior when printing regardless of screen size */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            .page-container { border: none; box-shadow: none; width: 100%; margin: 0; padding: 10mm; max-width: 100%; }
            .checkbox { border: 1px solid #000 !important; }
            .section-card { break-inside: avoid; margin-bottom: 15px; border: 1px solid #eee !important; }
            footer { position: fixed; bottom: 10mm; left: 10mm; right: 10mm; }
            .grid-cols-mobile { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
        }
        
        body {
            background-color: #faf9f6; /* Soft sand off-white */
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            -webkit-print-color-adjust: exact;
        }

        /* Responsive Container: Fluid on mobile, fixed-width A4 look on desktop */
        .page-container {
            width: 100%;
            max-width: 210mm; /* A4 Width for desktop */
            min-height: 297mm; /* A4 Height */
            background: #fff;
            margin: 0 auto;
            padding: 5% 7%; /* Responsive padding */
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .page-container {
                margin: 40px auto;
                border-radius: 4px;
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }

        .section-card {
            background: #fff;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .section-card {
                padding: 20px;
                border: none;
                border-bottom: 1px solid #f0f0f0;
            }
        }

        .checkbox {
            width: 18px;
            height: 18px;
            border: 1px solid #1a1a1a;
            margin-right: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background-color: #1a1a1a;
            position: relative;
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ai-badge {
            background: #1a1a1a;
            color: white;
            padding: 4px 10px;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            font-weight: 600;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .manual-add-input {
            border: none;
            border-bottom: 1px solid #e5e5e5;
            background: transparent;
            font-size: 0.85rem;
            padding: 8px 0;
            width: 100%;
            outline: none;
            font-style: italic;
        }

        .manual-add-input:focus {
            border-color: #1a1a1a;
        }

        .black-header {
            background-color: #111111;
            color: white;
        }

        .destination-input {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 10px 15px;
            font-size: 0.85rem;
            width: 100%;
            max-width: 280px;
            outline: none;
            transition: border-color 0.3s;
        }

        /* Category Button - Better touch target for mobile */
        .new-category-btn {
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Sticky Header - Responsive Layout -->
    <div class="no-print black-header p-4 shadow-2xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <input type="text" id="destination" placeholder="WHERE TO?" class="destination-input flex-grow">
                <button onclick="getGlobalTip()" id="globalAiBtn" class="bg-white text-black px-4 py-2.5 text-[10px] font-bold uppercase tracking-widest hover:bg-gray-200 transition-all flex-shrink-0">
                    Insight
                </button>
            </div>
            <div class="flex gap-4 w-full sm:w-auto justify-between sm:justify-end items-center">
                <div id="aiStatus" class="text-[10px] text-gray-400 tracking-wide uppercase"></div>
                <button onclick="window.print()" class="border border-white/20 text-white px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors whitespace-nowrap">
                    Print / Export
                </button>
            </div>
        </div>
    </div>

    <div class="page-container" id="printableArea">
        <header class="text-center mb-10 md:mb-16">
            <div class="text-[10px] tracking-[0.4em] text-gray-400 uppercase mb-4">Summer Collection</div>
            <h1 class="text-3xl md:text-5xl mb-3">Packing Checklist</h1>
            <div id="globalTipContainer" class="hidden mt-4 max-w-lg mx-auto">
                <p id="globalTipText" class="text-xs md:text-sm italic text-gray-500 border-l border-gray-200 pl-4 py-1 text-left md:text-center"></p>
            </div>
        </header>

        <!-- Responsive Grid: 1 col on mobile, 2 cols on desktop -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-2 md:gap-y-4 grid-cols-mobile" id="checklistContent">
            <!-- Content dynamically generated by JS -->
        </div>

        <div class="no-print mt-12 mb-16">
            <div class="new-category-btn" onclick="addNewCategory()">
                + New Category
            </div>
        </div>

        <footer class="mt-auto pt-10 flex flex-row justify-between items-end border-t border-gray-100 pb-4">
            <div class="w-2/3">
                <p class="text-[9px] tracking-widest uppercase text-gray-400 mb-1">Destination</p>
                <div id="footerDest" class="text-lg md:text-xl font-medium tracking-tight truncate">EXPLORING...</div>
            </div>
            <div class="text-right flex-shrink-0">
                <p class="text-[9px] tracking-widest uppercase text-gray-400 mb-1">Edition</p>
                <div id="currentDate" class="text-xs md:text-sm"></div>
            </div>
        </footer>
    </div>

    <script>
        const apiKey = ""; 
        let sections = [
            { id: 'clothes', title: 'Clothing & Swimwear', items: ['Swimsuits', 'Beach Cover-ups', 'Sundresses', 'Sandals', 'Linen Shorts'] },
            { id: 'essentials', title: 'Beach Gear', items: ['Oversized Towel', 'Sunglasses', 'Wide-brimmed Hat', 'Waterproof Pouch'] },
            { id: 'toiletries', title: 'Care & Protection', items: ['Reef-safe Sunscreen', 'After-sun Balm', 'Lip Conditioner', 'Hydrating Mist'] },
            { id: 'health', title: 'Wellness', items: ['Prescription Meds', 'Travel Electrolytes', 'First Aid Basics', 'Insect Repellent'] },
            { id: 'docs', title: 'Travel Documents', items: ['Passport', 'Travel Insurance', 'Local Currency', 'Hotel Confirmations'] },
            { id: 'tech', title: 'Tech & Media', items: ['Chargers', 'Noise Cancelling Buds', 'Power Bank', 'E-Reader'] }
        ];

        function updateDate() {
            const dateObj = new Date();
            const month = dateObj.toLocaleString('default', { month: 'long' });
            const year = dateObj.getFullYear();
            document.getElementById('currentDate').innerText = `${month} ${year}`;
        }

        async function geminiFetch(prompt) {
            let retries = 0;
            const maxRetries = 5;
            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    retries++;
                    await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                }
            }
            throw new Error("API Connection Failed");
        }

        async function getGlobalTip() {
            const dest = document.getElementById('destination').value;
            if (!dest) return;
            const status = document.getElementById('aiStatus');
            status.innerText = "CONSULTING...";
            try {
                const prompt = `Traveler is going to ${dest}. Provide a "Vibe Check" (one sentence about the atmosphere) and one "Must Pack" specific item. Max 25 words total. Format: [vibe] | Must Pack: [item]`;
                const result = await geminiFetch(prompt);
                document.getElementById('globalTipContainer').classList.remove('hidden');
                document.getElementById('globalTipText').innerText = result;
                document.getElementById('footerDest').innerText = dest.toUpperCase();
                status.innerText = "UPDATED";
            } catch (e) {
                status.innerText = "ERROR";
            } finally {
                setTimeout(() => status.innerText = "", 3000);
            }
        }

        function addItemToUI(sectionId, itemName, isAi = false) {
            const container = document.querySelector(`#list-${sectionId}`);
            if (!container) return;
            const itemDiv = document.createElement('div');
            itemDiv.className = `flex items-start mb-4 text-[14px] md:text-[13px] tracking-tight ${isAi ? 'ai-generated' : ''}`;
            itemDiv.innerHTML = `
                <div class="checkbox" onclick="this.classList.toggle('checked')"></div>
                <span class="leading-tight pt-[1px]">${itemName}</span>
            `;
            container.appendChild(itemDiv);
        }

        function handleManualAdd(e, sectionId) {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (val) {
                    addItemToUI(sectionId, val, false);
                    e.target.value = '';
                }
            }
        }

        async function suggestItems(sectionId, title) {
            const dest = document.getElementById('destination').value || "a tropical location";
            const btn = document.querySelector(`#btn-${sectionId}`);
            const status = document.getElementById('aiStatus');
            status.innerText = "CURATING...";
            try {
                const prompt = `I am going to ${dest}. Suggest 3 premium/niche packing items for: ${title}. Return ONLY items separated by commas. Max 3 words each.`;
                const result = await geminiFetch(prompt);
                const newItems = result.split(',').map(i => i.trim());
                newItems.forEach(item => { if (item) addItemToUI(sectionId, item, true); });
                btn.style.display = 'none';
                status.innerText = "REFINED";
            } catch (e) {
                status.innerText = "BUSY";
            } finally {
                setTimeout(() => status.innerText = "", 3000);
            }
        }

        function addNewCategory() {
            const name = prompt("Category Name:");
            if (!name) return;
            const id = 'custom_' + Date.now();
            renderSingleSection({ id, title: name, items: [] });
        }

        function renderSingleSection(s) {
            const container = document.getElementById('checklistContent');
            const card = document.createElement('div');
            card.className = "section-card";
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] pt-1">${s.title}</h3>
                    <button id="btn-${s.id}" onclick="suggestItems('${s.id}', '${s.title}')" class="no-print ai-badge">AI</button>
                </div>
                <div id="list-${s.id}" class="flex-grow">
                    ${s.items.map(item => `
                        <div class="flex items-start mb-4 text-[14px] md:text-[13px] tracking-tight">
                            <div class="checkbox" onclick="this.classList.toggle('checked')"></div>
                            <span class="leading-tight pt-[1px]">${item}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-2 no-print">
                    <input type="text" placeholder="+ add note" class="manual-add-input" onkeypress="handleManualAdd(event, '${s.id}')">
                </div>
            `;
            container.appendChild(card);
        }

        function render() {
            const container = document.getElementById('checklistContent');
            container.innerHTML = '';
            sections.forEach(s => renderSingleSection(s));
            updateDate();
        }
        
        render();
    </script>
</body>
</html>
